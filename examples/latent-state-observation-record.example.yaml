interpretation_boundary:
  summary: >
    The observation method detected two candidate latent signals within
    the specified inspection scope. This record does not establish that
    either signal caused the model's downstream output.

  method_dependence_note: >
    Signal labels and scores depend on the observation method,
    configuration, thresholds, model version, and inspection scope.

  limitations:
    - The observation covers only selected layers and token positions.
    - Signal labels may not correspond one-to-one with model concepts.
    - The record does not include causal intervention evidence.
    - The observation has not been independently reproduced.

